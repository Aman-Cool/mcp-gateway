# External A2A agent registration via an Istio Hostname backendRef.
#
# Mirrors the external MCP server setup (docs/guides/external-mcp-server.md): a ServiceEntry
# registers the external host in Istio's registry, a DestinationRule originates TLS to it, an
# HTTPRoute routes an internal hostname to the external host via a Hostname backendRef, and the
# A2AAgentRegistration points at that route. The broker then fetches the agent card over TLS
# and serves it through the gateway; A2A traffic is routed with no path rewrite.
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: weather-agent-external
  namespace: mcp-test
spec:
  hosts:
    - weather-agent.example.com
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: weather-agent-external
  namespace: mcp-test
spec:
  host: weather-agent.example.com
  trafficPolicy:
    tls:
      mode: SIMPLE
      sni: weather-agent.example.com
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: weather-agent-external-route
  namespace: mcp-test
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: mcp-gateway
      namespace: gateway-system
  hostnames:
    - weather-agent.mcp.local # matches the gateway's *.mcp.local wildcard listener
  rules:
    - filters:
        - type: URLRewrite
          urlRewrite:
            hostname: weather-agent.example.com # rewrite the host header to the external agent
      backendRefs:
        - name: weather-agent.example.com
          kind: Hostname
          group: networking.istio.io
          port: 443
---
apiVersion: mcp.kuadrant.io/v1alpha1
kind: A2AAgentRegistration
metadata:
  name: weather-agent
  namespace: mcp-test
spec:
  agentPrefix: weather # immutable; requests to /a2a/weather route to this agent
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: weather-agent-external-route
  # credentialRef:            # broker-only credential for card discovery; secret needs
  #   name: weather-agent-secret  # the label mcp.kuadrant.io/secret=true
  #   key: token
  state: Enabled
