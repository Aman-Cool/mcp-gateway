apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2a-test-server
  labels:
    app: a2a-test-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2a-test-server
  template:
    metadata:
      labels:
        app: a2a-test-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
      - name: a2a-test-server
        image: ghcr.io/kuadrant/mcp-gateway/test-a2a-server:latest
        imagePullPolicy: Never
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 9090
          name: http
        env:
        - name: AGENT_NAME
          value: "a2a-test-agent"
        - name: SKILLS
          value: "forecast,alerts"
        # the card must advertise the agent's gateway path (matching the mcp-test/weather
        # registration): the broker fail-closes on a card whose interface URL points anywhere
        # else, since a direct-upstream URL would send clients around the gateway
        - name: AGENT_URL
          value: "http://mcp.127-0-0-1.sslip.io:8001/a2a/mcp-test/weather"
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
          requests:
            memory: "64Mi"
            cpu: "50m"
